name: "📋 Generar índice de documentos en README"

on:
  push:
    paths:
      - '**/*.docx'
      - '**/*.xlsx'

permissions:
  contents: write

jobs:
  generate-index:
    name: "📚 Actualizar índice de documentos en README"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Generar índice de documentos
        shell: bash
        run: |
          ALL_DOCX=$(find . -type f \( -name "*.docx" -o -name "*.xlsx" \) -not -path './.git/*' | sed 's|^\./||' | sort)

          TOTAL_DOCX=$(find . -type f -name "*.docx" -not -path './.git/*' | wc -l)
          TOTAL_XLSX=$(find . -type f -name "*.xlsx" -not -path './.git/*' | wc -l)
          TOTAL=$((TOTAL_DOCX + TOTAL_XLSX))

          {
            echo "| Tipo | Cantidad |"
            echo "|---|---|"
            echo "| 📝 Documentos Word (.docx) | **${TOTAL_DOCX}** |"
            echo "| 📊 Hojas de cálculo (.xlsx) | **${TOTAL_XLSX}** |"
            echo "| 📄 **Total** | **${TOTAL}** |"
            echo ""

            CURRENT_FOLDER=""
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              DIRNAME=$(dirname "$file")
              FILENAME=$(basename "$file")
              EXT="${FILENAME##*.}"

              LAST_DATE=$(git log -1 --format="%ai" -- "$file" 2>/dev/null | cut -d' ' -f1 || echo "—")
              LAST_AUTHOR=$(git log -1 --format="%an" -- "$file" 2>/dev/null || echo "—")

              if [ "$EXT" = "docx" ]; then
                ICON="📝"
              else
                ICON="📊"
              fi

              if [ "$DIRNAME" != "$CURRENT_FOLDER" ]; then
                CURRENT_FOLDER="$DIRNAME"
                echo ""
                echo "#### 📁 \`${DIRNAME}/\`"
                echo ""
                echo "| | Documento | Última modificación | Autor |"
                echo "|---|---|---|---|"
              fi

              echo "| ${ICON} | \`${FILENAME}\` | ${LAST_DATE} | ${LAST_AUTHOR} |"
            done <<< "$ALL_DOCX"
          } > /tmp/docs_index.txt

          echo "Índice generado correctamente."

      - name: 📝 Actualizar README.md con el índice
        shell: bash
        run: |
          if ! grep -q "<!-- DOCS-INDEX-START -->" README.md; then
            echo "No se encontraron marcadores de índice en README.md. Saltando."
            exit 0
          fi

          cat > /tmp/update_index.py << 'PYSCRIPT'
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          with open('/tmp/docs_index.txt', 'r', encoding='utf-8') as f:
              index = f.read().strip()

          pattern = r'(<!-- DOCS-INDEX-START -->).*?(<!-- DOCS-INDEX-END -->)'
          replacement = (
              '<!-- DOCS-INDEX-START -->\n\n'
              + index + '\n\n'
              + '> 🤖 *Índice generado automáticamente vía GitHub Actions.*\n\n'
              + '<!-- DOCS-INDEX-END -->'
          )

          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_readme)

          print("README.md actualizado con el índice.")
          PYSCRIPT

          python3 /tmp/update_index.py

      - name: 📤 Commit y push del README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "ℹ️ No hay cambios en el índice."
          else
            git add README.md
            git commit -m "🤖 docs: actualizar índice de documentos en README.md"
            git push
            echo "✅ Índice actualizado en README.md."
          fi
